<!DOCTYPE html>

<body>
    <div id="main_content">
        <div class="form_box">
            <div class="form_title">
                Survei Minat Bakat
            </div>
            <div class="from_content">
                <div class="separator"></div>
                <label class="form_label">Nama</label>
                <input type="text" name="awal nama" class="form_textbox_short">
                <input type="text" name="akhir nama" class="form_textbox_short">
                <div class="separator"></div>

                <label class="form_label">Email</label>
                <input type="text" name="email" class="form_textbox_short">
                <div class="separator"></div>

                <label class="form_label">Nomor WA</label>
                <input type="text" name="area_code" class="form_textbox_short">
                <input type="text" name="phone_number" class="form_textbox_short">
                <div class="separator"></div>

                <label class="form_label">Departemen</label>
                <input type="text" name="departemen" class="form_textbox_short">
                <div class="separator"></div>

                <label class="form_label">UKM</label>
                <select name="text" name="ukm" class="form_textbox_short">
                    <option value="">Choose Option</option>
                    <option value="1">Olahraga</option>
                    <option value="2">Bela Diri</option>
                    <option value="3">Seni</option>
                    <option value="4">Khusus</option>
                    <option value="5">Tim Riset</option>
                </select>
                <div class="separator"></div>
                <label class="form_label">Mahasiswa angkatan</label>
                <select name="text" name="mahasiswa_angkatan" class="form_textbox_short">
                    <option value="">Choose Option</option>
                    <option value="1">2023</option>
                    <option value="2">2024</option>
                    <option value="3">2025</option>
                </select>
            </form>    
        </div>
    </div>
